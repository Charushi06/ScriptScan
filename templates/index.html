<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIST Digit Recognition</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Handwritten Digit Recognition</h1>
            <p>Draw a digit (0-9) and let the AI predict it.</p>
        </header>

        <!-- Main Content -->
        <main>
            <div class="canvas-container">
                <canvas id="drawingCanvas" width="280" height="280"></canvas>
                <div class="controls">
                    <button id="clearBtn" class="btn btn-secondary">Clear</button>
                    <button id="predictBtn" class="btn btn-primary">Predict</button>
                </div>
            </div>

            <div class="result-container">
                <h2>Prediction</h2>
                <div id="predictionResult" class="prediction-box">?</div>
                <p id="confidenceScore">Confidence: -</p>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <p>Powered by TensorFlow & Flask</p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
